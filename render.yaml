# Render Blueprint — EGentid Spa & Resurs
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy:
# 1. Open https://YOUR-SERVICE.onrender.com/admin/
# 2. Log in with DJANGO_SUPERUSER_USERNAME / DJANGO_SUPERUSER_PASSWORD (see Environment)
# 3. Set SEED_ON_DEPLOY=false after starter content is loaded
# 4. Admin → Webbplatsinställningar → set public_site_url to your https URL

databases:
  - name: egentid-db
    databaseName: egentid
    user: egentid
    plan: free
    # Render default is 18; set explicitly so blueprint matches the dashboard.
    postgresMajorVersion: "18"

services:
  - type: web
    name: egentidsparesurs
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "bash start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DATABASE_URL
        fromDatabase:
          name: egentid-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        # Add your custom domain later, e.g. egentidsparesurs.se,.onrender.com
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        # Set after first deploy to https://YOUR-SERVICE.onrender.com
        sync: false
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: SERVE_MEDIA
        value: "true"
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@egentidsparesurs.se
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      # true = force re-seed; content also auto-seeds when homepage is missing
      - key: SEED_ON_DEPLOY
        value: "true"
    # Remove disk block if your plan has no disks (app falls back to ./media).
    disk:
      name: egentid-media
      mountPath: /var/data
      sizeGB: 1
